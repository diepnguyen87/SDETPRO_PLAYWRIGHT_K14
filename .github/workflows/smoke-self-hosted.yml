name: Smoke Self-hosted CI

on:
  push:
    branches:
      - day-31

  workflow_dispatch:

jobs:
  mobile-web:
    name: Mobile Web - ${{ matrix.config.project }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - project: mobile-chrome
            engine: chromium

          - project: mobile-safari
            engine: webkit

    uses: ./.github/workflows/reusable-workflow.yml

    with:
      command: test:smoke
      browser: ${{ matrix.config.project }}
      engine: ${{ matrix.config.engine }}
      runner: mobile

    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}